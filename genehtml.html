<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Web Generator Fix Download</title>
<style>
  body{font-family:Arial;background:#0f172a;color:#fff;padding:20px;margin:0}
.gen-box{max-width:600px;margin:auto;background:#1e293b;padding:25px;border-radius:15px}
.gen-box h1{text-align:center;color:#38bdf8}
.gen-input,.gen-select,.gen-btn{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;font-size:16px}
.gen-input,.gen-select{background:#334155;color:#fff}
.gen-btn{background:#22c55e;color:#fff;font-weight:bold;cursor:pointer}
.gen-btn:hover{background:#16a34a}
.preview{margin-top:20px;padding:15px;background:#0b1120;border-radius:10px;font-size:13px;white-space:pre-wrap;max-height:200px;overflow:auto}
</style>
</head>
<body>
<div class="gen-box">
  <h1>🔧 Web Generator</h1>

  <label>Nama Web/Orang:</label>
  <input type="text" id="nama" class="gen-input" placeholder="Contoh: Meong">

  <label>Pilih Template:</label>
  <select id="template" class="gen-select">
    <option value="bug">Template Bug Gombal</option>
    <option value="marketplace">Template Marketplace Mini</option>
    <option value="biodata">Template Biodata</option>
  </select>

  <button onclick="generate()" class="gen-btn">Generate Web!</button>
  <div id="hasil"></div>
</div>

<script>
const templates = {
  bug: '<!DOCTYPE html><html><head><title>{NAMA}</title><style>body{background:pink;text-align:center;padding:50px;font-family:Arial}.btn-bug{padding:15px 30px;font-size:20px;background:red;color:white;border:none;border-radius:10px;position:absolute}.btn-mau{background:green;position:static;margin-top:100px}</style></head><body><h1>{NAMA} mau jadi pacar gue ga? 😳</h1><button class="btn-bug" onmouseover="this.style.left=Math.random()*300+\'px\';this.style.top=Math.random()*300+\'px\'">Engga</button><button class="btn-mau" onclick="alert(\'{NAMA} pasti mau kan 🥰\')">Mau</button></body></html>',

  marketplace: '<!DOCTYPE html><html><head><title>{NAMA} Store</title><style>body{font-family:Arial;background:#f3f4f6;padding:20px}.produk{background:white;padding:15px;margin:10px;border-radius:10px}</style></head><body><h1>🛒 {NAMA}</h1><div class="produk"><h3>Produk 1</h3><p>Rp50.000</p><button>Beli</button></div></body></html>',

  biodata: '<!DOCTYPE html><html><head><title>Biodata {NAMA}</title><style>body{background:#667eea;color:white;text-align:center;padding:50px;font-family:Arial}.card{background:rgba(255,255,255,0.2);padding:30px;border-radius:20px}</style></head><body><div class="card"><h1>Gue {NAMA}</h1><p>Hobi: Ngoding</p></div></body></html>'
};

function generate(){
  const nama = document.getElementById('nama').value.trim();
  const template = document.getElementById('template').value;
  if(!nama){alert('Isi nama dulu bro!');return;}

  let kode = templates[template].replaceAll('{NAMA}', nama);
  const namaFile = nama.toLowerCase().replace(/\s+/g, '-') + '-' + template + '.html';

  // Simpan kode ke variabel global biar bisa di download
  window.kodeTerakhir = kode;
  window.namaFileTerakhir = namaFile;

  document.getElementById('hasil').innerHTML = `
    <h3>Jadi nih:</h3>
    <p>Nama file: <b>${namaFile}</b></p>
    <button onclick="downloadFile()" class="gen-btn">📥 Download HTML</button>
    <div class="preview">${kode.substring(0,300)}...</div>
  `;
}

function downloadFile(){
  const kode = window.kodeTerakhir;
  const namaFile = window.namaFileTerakhir;

  const blob = new Blob([kode], {type: 'text/html'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = namaFile;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
}
</script>
</body>
</html>
